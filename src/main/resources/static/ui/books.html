<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books Search - Book Nook</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="books">
  <div class="app-shell">
    <main class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">Books Search</h1>
          <p class="page-subtitle">Search by keyword, author, category, publisher, tags, and numeric ranges.</p>
        </div>
      </div>

      <div id="books-message" class="alert hidden"></div>

      <section class="card">
        <form id="filter-form" class="form-grid">
          <div class="field full">
            <label class="label" for="keyword">Keyword</label>
            <input id="keyword" placeholder="Search by title, author, category, publisher, or tag" />
          </div>

          <div class="field">
            <label class="label" for="author-search">Authors</label>
            <div class="filter-picker">
              <input id="author-search" placeholder="Search author name" />
              <div id="author-filter" class="filter-list"></div>
              <div id="author-selected" class="tags"></div>
            </div>
          </div>

          <div class="field">
            <label class="label" for="publisher-filter">Publishers</label>
            <select id="publisher-filter" multiple size="6"></select>
          </div>

          <div class="field">
            <label class="label">Price Range</label>
            <div class="grid two">
              <input id="fromPrice" type="number" step="0.01" placeholder="Min price" />
              <input id="toPrice" type="number" step="0.01" placeholder="Max price" />
            </div>
          </div>

          <div class="field">
            <label class="label">Pages Range</label>
            <div class="grid two">
              <input id="fromPagesNumber" type="number" placeholder="Min pages" />
              <input id="toPagesNumber" type="number" placeholder="Max pages" />
            </div>
          </div>

          <div class="field">
            <label class="label">Reading Duration Range</label>
            <div class="grid two">
              <input id="fromReadingDuration" type="number" placeholder="Min duration" />
              <input id="toReadingDuration" type="number" placeholder="Max duration" />
            </div>
          </div>

          <div class="field">
            <label class="label" for="pageSize">Page Size</label>
            <input id="pageSize" type="number" min="1" value="8" />
          </div>

          <div class="field">
            <label class="label" for="sortField">Sort Field</label>
            <select id="sortField">
              <option value="id">id</option>
              <option value="name">name</option>
              <option value="price">price</option>
              <option value="pagesNumber">pagesNumber</option>
              <option value="readingDuration">readingDuration</option>
              <option value="rate">rate</option>
              <option value="availableCopies">availableCopies</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="sortDirection">Sort Direction</label>
            <select id="sortDirection">
              <option value="ASC">ASC</option>
              <option value="DESC">DESC</option>
            </select>
          </div>

          <div class="field full">
            <label class="label">Categories</label>
            <div id="category-filters" class="choice-grid"></div>
          </div>

          <div class="field full">
            <label class="label">Tags</label>
            <div id="tag-filters" class="choice-grid"></div>
          </div>

          <div class="field full">
            <div class="form-actions">
              <button class="primary" type="submit">Search</button>
              <button id="reset-search" type="button">Reset</button>
            </div>
          </div>
        </form>
      </section>

      <section>
        <div class="page-header">
          <div>
            <h2 class="page-title" style="font-size:24px;">Results</h2>
            <p id="page-summary" class="page-subtitle">No search executed yet.</p>
          </div>
          <div class="form-actions">
            <input id="currentPage" type="hidden" value="1" />
            <button id="prev-page" type="button">Previous</button>
            <button id="next-page" type="button">Next</button>
          </div>
        </div>
        <div id="book-results" class="book-list"></div>
      </section>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/books.js"></script>
</body>
</html>
