<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的推荐 - 图书推荐系统</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/recommendations.css" />
</head>
<body data-page="recommendations">
  <div class="app-shell">
    <main class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">我的推荐</h1>
          <p class="page-subtitle">推荐结果按热门度、阅读偏好、协同过滤和用户行为信号分组展示，便于解释和演示。</p>
        </div>
      </div>
      <section class="card">
        <h2>推荐说明</h2>
        <p class="muted">当前用户：<span id="recommend-user">加载中...</span></p>
        <p class="muted">当前页面将不同推荐来源拆成多个书架展示，并为每本书补充推荐理由，方便答辩时说明逻辑。</p>
      </section>
      <section class="recommendations-section">
        <div id="recommend-result" class="recommend-stack"></div>
      </section>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/recommendations.js"></script>
</body>
</html>
