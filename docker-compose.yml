services:
  db:
    image: postgres:16-alpine
    container_name: book-recommendation-db
    environment:
      POSTGRES_DB: book_recommendation_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5043:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d book_recommendation_system"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: book-recommendation-search
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-recommendation-app
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SERVER_PORT: 8010
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/book_recommendation_system
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_FORMAT_SQL: "false"
      LIBRARY_SECURITY_JWT_SECRET: change-me-in-production
      LIBRARY_SEARCH_ENABLED: "true"
      LIBRARY_BOOTSTRAP_ADMIN_ENABLED: "true"
      LIBRARY_BOOTSTRAP_ADMIN_EMAIL: admin@booknook.local
      LIBRARY_BOOTSTRAP_ADMIN_PASSWORD: Admin123!
      LIBRARY_BOOTSTRAP_ADMIN_FIRST_NAME: System
      LIBRARY_BOOTSTRAP_ADMIN_LAST_NAME: Admin
    ports:
      - "8010:8010"
    restart: unless-stopped

volumes:
  postgres-data:
