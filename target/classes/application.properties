# server
server.port= 8010
server.servlet.context-path=/book-service
spring.application.name=book-recommendation-system

# Spring postgres datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.datasource.url=jdbc:postgresql://localhost:5043/book_recommendation_system
spring.datasource.username=postgres
spring.datasource.password=20041117

# Spring liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/book-recommendation-system.xml

# Hibernate jpa ddl
spring.jpa.hibernate.ddl-auto=none

# Spring jpa
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false

# Hibernate show sql
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Properties
library.security.jwtSecret=book-recommendation-auth-secret
library.security.jwt.accessToken.expirationMs=3600000
library.security.jwt.refreshToken.expirationMs=86400000

# Bootstrap admin account for local development
library.bootstrap.admin.enabled=true
library.bootstrap.admin.email=admin@booknook.local
library.bootstrap.admin.password=Admin123!
library.bootstrap.admin.first-name=System
library.bootstrap.admin.last-name=Admin
