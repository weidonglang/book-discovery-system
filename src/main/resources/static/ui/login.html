<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - ReadSeek 阅读资源智能发现系统</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body data-page="login">
  <div class="app-shell">
    <main class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">登录后继续你的阅读资源发现</h1>
          <p class="page-subtitle">登录后即可进入首页、智能检索、可解释推荐、借阅提醒和个人阅读空间。</p>
        </div>
      </div>
      <div class="grid two login-layout">
        <section class="card">
          <div id="login-message" class="alert hidden"></div>
          <form id="login-form">
            <div class="field">
              <label class="label" for="email">邮箱</label>
              <input id="email" type="email" required placeholder="请输入邮箱" autocomplete="email" />
            </div>
            <div class="field">
              <label class="label" for="password">密码</label>
              <input id="password" type="password" required placeholder="请输入密码" autocomplete="current-password" />
            </div>
            <details class="login-advanced-settings">
              <summary class="login-advanced-summary">连接设置（一般无需修改）</summary>
              <div class="field">
                <label class="label" for="api-base-url">服务地址</label>
                <input id="api-base-url" placeholder="http://localhost:8010/book-service" />
                <div class="muted login-advanced-copy">只有在服务地址与默认值不一致时，才需要在这里修改。</div>
              </div>
            </details>
            <div class="form-actions">
              <button class="primary" type="submit">登录</button>
              <a href="register.html"><button type="button">去注册</button></a>
            </div>
          </form>
        </section>
        <section class="card">
          <h2>登录说明</h2>
          <div class="muted">使用已注册账号登录后，系统会自动保存登录状态，并同步当前用户信息。大多数情况下，只需要输入邮箱和密码。</div>
          <ul>
            <li>默认管理员邮箱：<code>admin@booknook.local</code></li>
            <li>默认管理员密码：<code>Admin123!</code></li>
            <li>默认服务地址：<code>http://localhost:8010/book-service</code></li>
            <li>登录成功后会优先返回你刚才准备访问的页面。</li>
          </ul>
        </section>
      </div>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
