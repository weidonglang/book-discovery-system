<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图书详情 - 图书推荐系统</title>
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/book-detail.css" />
</head>
<body data-page="bookDetail">
  <div class="app-shell">
    <main class="page">
      <div id="detail-message" class="alert hidden"></div>
      <div class="page-header">
        <div>
          <div class="panel-kicker detail-page-kicker">作品页</div>
          <h1 class="page-title">图书详情</h1>
          <p class="page-subtitle">查看图书完整信息，包括出版社、标签、库存、借阅与预约状态，并从同类作品继续延伸阅读。</p>
        </div>
        <div class="form-actions detail-action-bar">
          <button id="borrow-book-btn" type="button">借阅图书</button>
          <button id="reserve-book-btn" class="hidden" type="button">预约图书</button>
          <button id="cancel-reservation-btn" class="hidden" type="button">取消预约</button>
          <a id="go-rate" href="rate-book.html"><button class="primary" type="button">去评分</button></a>
          <a href="borrowings.html"><button type="button">我的借阅</button></a>
          <a href="books.html"><button type="button">返回图书列表</button></a>
        </div>
      </div>
      <section class="detail-layout">
        <article class="card">
          <div id="detail-cover" class="detail-cover"></div>
        </article>
        <article class="card detail-content-card">
          <div class="detail-copy-lead">
            <div class="panel-kicker">作品导读</div>
          </div>
          <h2 id="detail-title">加载中...</h2>
          <p id="detail-desc" class="hero-copy"></p>
          <div id="detail-meta" class="info-list"></div>
        </article>
      </section>
      <section class="detail-section">
        <div class="page-header">
          <div>
            <h2 class="page-title detail-section-title">相关图书推荐</h2>
            <p class="page-subtitle">先从同分类和相似标签继续扩展，帮助你沿着当前阅读兴趣往下走。</p>
          </div>
        </div>
        <div id="similar-books" class="recommend-stack"></div>
      </section>
      <section class="detail-section">
        <div class="page-header">
          <div>
            <h2 class="page-title detail-section-title">同作者更多作品</h2>
            <p class="page-subtitle">如果你想继续停留在同一种写作风格里，可以从这里直接切换到作者书架。</p>
          </div>
        </div>
        <div id="author-books" class="book-list"></div>
      </section>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/book-detail.js"></script>
</body>
</html>
