# server
server.port=${SERVER_PORT:8010}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/book-service}
spring.application.name=book-recommendation-system

# Spring postgres datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5043/book_recommendation_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.connection-timeout=${SPRING_ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
spring.elasticsearch.socket-timeout=${SPRING_ELASTICSEARCH_SOCKET_TIMEOUT:10s}

# Spring liquibase
spring.liquibase.enabled=${SPRING_LIQUIBASE_ENABLED:true}
spring.liquibase.change-log=classpath:/db/book-recommendation-system.xml

# Hibernate jpa ddl
spring.jpa.hibernate.ddl-auto=none

# Spring jpa
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false

# Hibernate show sql
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# Security Properties
library.security.jwtSecret=${LIBRARY_SECURITY_JWT_SECRET:book-recommendation-auth-secret}
library.security.jwt.accessToken.expirationMs=${LIBRARY_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
library.security.jwt.refreshToken.expirationMs=${LIBRARY_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_MS:86400000}

# Search
library.search.enabled=${LIBRARY_SEARCH_ENABLED:true}
library.search.book-index-name=${LIBRARY_SEARCH_BOOK_INDEX_NAME:book-search-v1}
library.search.max-results=${LIBRARY_SEARCH_MAX_RESULTS:20}
library.search.vector.enabled=${LIBRARY_SEARCH_VECTOR_ENABLED:false}
library.search.vector.candidate-limit=${LIBRARY_SEARCH_VECTOR_CANDIDATE_LIMIT:12}
library.search.vector.min-score=${LIBRARY_SEARCH_VECTOR_MIN_SCORE:0.0}
library.search.embedding.enabled=${LIBRARY_SEARCH_EMBEDDING_ENABLED:false}
library.search.embedding.provider=${LIBRARY_SEARCH_EMBEDDING_PROVIDER:local-ai}
library.search.embedding.base-url=${LIBRARY_SEARCH_EMBEDDING_BASE_URL:http://localhost:8001}
library.search.embedding.model=${LIBRARY_SEARCH_EMBEDDING_MODEL:bge-small-zh-v1.5}
library.search.embedding.dimensions=${LIBRARY_SEARCH_EMBEDDING_DIMENSIONS:384}
library.search.embedding.timeout-ms=${LIBRARY_SEARCH_EMBEDDING_TIMEOUT_MS:5000}
library.search.embedding.query-input-type=${LIBRARY_SEARCH_EMBEDDING_QUERY_INPUT_TYPE:query}
library.search.embedding.document-input-type=${LIBRARY_SEARCH_EMBEDDING_DOCUMENT_INPUT_TYPE:document}

# Bootstrap admin account for local development
library.bootstrap.admin.enabled=${LIBRARY_BOOTSTRAP_ADMIN_ENABLED:true}
library.bootstrap.admin.email=${LIBRARY_BOOTSTRAP_ADMIN_EMAIL:admin@booknook.local}
library.bootstrap.admin.password=${LIBRARY_BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
library.bootstrap.admin.first-name=${LIBRARY_BOOTSTRAP_ADMIN_FIRST_NAME:System}
library.bootstrap.admin.last-name=${LIBRARY_BOOTSTRAP_ADMIN_LAST_NAME:Admin}
